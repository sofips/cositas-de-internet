  <!-- Image Modal -->
  <div id="image-modal" class="image-modal">
    <button class="modal-close">✕</button>
    <button class="modal-prev">◀</button>
    <button class="modal-next">▶</button>
    <div class="modal-content">
      <img id="modal-img" src="" alt="">

        <p id="modal-description"></p>

  <script>
    // Image Modal with Navigation
    const modal = document.getElementById('image-modal');
    const modalImg = document.getElementById('modal-img');
    const modalDesc = document.getElementById('modal-description');
    const modalTags = document.getElementById('modal-tags');
    const closeBtn = document.querySelector('.modal-close');
    const prevBtn = document.querySelector('.modal-prev');
    const nextBtn = document.querySelector('.modal-next');
    const slides = Array.from(document.querySelectorAll('.carousel-slide, .gallery-item'));
    let currentIndex = 0;
    
    function showImage(index) {
      if (index < 0) index = slides.length - 1;
      if (index >= slides.length) index = 0;
      currentIndex = index;
      
      const slide = slides[currentIndex];
      const img = slide.querySelector('img');
      const desc = slide.dataset.description || '';
      const tags = slide.dataset.tags || '';
      
      modalImg.src = img.src;
      modalDesc.textContent = desc;
      modalTags.innerHTML = tags.split(',').filter(t => t.trim())
        .map(t => '<a href="/fotos/' + encodeURIComponent(t.trim()) + '.html" class="tag">' + t.trim() + '</a>').join('');
    }
    
    slides.forEach((slide, idx) => {
      slide.addEventListener('click', () => {
        currentIndex = idx;
        showImage(currentIndex);
        modal.classList.add('active');
      });
    });
    
    prevBtn?.addEventListener('click', (e) => { e.stopPropagation(); showImage(currentIndex - 1); });
    nextBtn?.addEventListener('click', (e) => { e.stopPropagation(); showImage(currentIndex + 1); });
    closeBtn.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });
    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('active')) return;
      if (e.key === 'Escape') modal.classList.remove('active');
      if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
      if (e.key === 'ArrowRight') showImage(currentIndex + 1);
    });
    
    // Word of the Day
    (function() {
      const termEl = document.getElementById('word-term');
      const defEl = document.getElementById('word-definition');
      const srcEl = document.getElementById('word-source');
      if (!termEl || !defEl) return;
      
      function pickRandom(list) {
        return list[Math.floor(Math.random() * list.length)];
      }
      
      function renderWord(item) {
        termEl.textContent = item.term || 'Palabra';
        defEl.textContent = item.definition || '';
        if (item.source) {
          srcEl.href = item.source;
          srcEl.style.display = '';
        } else {
          srcEl.style.display = 'none';
        }
      }
      
      function loadWord() {
        const basePath = '/cositas-de-internet';
        fetch(basePath + '/definitions.json?v=1770063102')
          .then(r => r.json())
          .then(arr => {
            if (Array.isArray(arr) && arr.length) {
              renderWord(pickRandom(arr));
              // expose for refresh button
              window.__refreshWord = () => renderWord(pickRandom(arr));
            } else {
              termEl.textContent = 'Sin palabras';
              defEl.textContent = 'Agrega definiciones en /public/definitions.json';
            }
          })
          .catch(() => {
            termEl.textContent = 'Sin conexión';
            defEl.textContent = 'No se pudo cargar el diccionario.';
          });
      }
      loadWord();
    })();
    
    // Random button - uses pre-generated links
    const randomLinks = ["/cositas-de-internet/notes/00bienvenida.html","/cositas-de-internet/notes/aleatorio.html","/cositas-de-internet/notes/jardines.html","/cositas-de-internet/fotos/panchito.html","/cositas-de-internet/fotos/vino.html","/cositas-de-internet/fotos/yo.html","/cositas-de-internet/fotos/foto.html","/cositas-de-internet/fotos/Mendoza.html","/cositas-de-internet/fotos/Tunuy%C3%A1n.html","/cositas-de-internet/fotos/vacaciones.html","/cositas-de-internet/fotos/amigas.html","/cositas-de-internet/fotos/guiso.html","/cositas-de-internet/fotos/Anita.html","/cositas-de-internet/fotos/Clari.html","/cositas-de-internet/fotos/Day.html","/cositas-de-internet/fotos/atardecer.html","/cositas-de-internet/fotos/soda.html","/cositas-de-internet/fotos/Buenos%20Aires.html","/cositas-de-internet/fotos/"];
    function goRandom() {
      if (randomLinks.length > 0) {
        window.location.href = randomLinks[Math.floor(Math.random() * randomLinks.length)];
      }
    }
    
    // External sites for luck button - loaded from JSON
    let externalSitesLoaded = false;
    let externalSites = [];
    const basePath = '/cositas-de-internet';
    
    fetch(basePath + '/external-sites.json?v=1770063102')
      .then(r => r.json())
      .then(sites => {
        if (Array.isArray(sites) && sites.length) {
          externalSites = sites;
          externalSitesLoaded = true;
        }
      })
      .catch(err => {
        console.warn('No se pudo cargar la lista de sitios externos:', err);
      });
    
    function goExternal() {
      if (!externalSitesLoaded || externalSites.length === 0) {
        alert('⏳ La lista de sitios aún se está cargando. Intentá de nuevo en un momento.');
        return;
      }
      const site = externalSites[Math.floor(Math.random() * externalSites.length)];
      if (site && site.url) {
        window.open(site.url, '_blank', 'noopener,noreferrer');
      }
    }
  </script>
